---
# ConfigMap — tune these to match your environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: simple-scan-web-config
  namespace: default
data:
  RESOLUTION: "300"
  SCAN_MODE: "Color"
  CONSUME_DIR: "/consume"
  TEMP_DIR: "/tmp/simple-scan-web"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-scan-web
  namespace: default
  labels:
    app: simple-scan-web
spec:
  replicas: 1          # must stay 1 — session state is in-memory
  strategy:
    type: Recreate     # avoid two pods fighting over the scanner
  selector:
    matchLabels:
      app: simple-scan-web
  template:
    metadata:
      labels:
        app: simple-scan-web
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: simple-scan-web
          image: ghcr.io/srijan/simple-scan-web:latest   # pushed by GitHub Actions
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: simple-scan-web-config
          volumeMounts:
            - name: consume
              mountPath: /consume
            - name: dbus
              mountPath: /var/run/dbus
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /scan/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /scan/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: dbus
          hostPath:
            path: /var/run/dbus
        - name: consume
          # Option A: NFS share
          nfs:
            server: YOUR_NAS_OR_SERVER_IP    # replace with your server IP
            path: /path/to/output            # replace with your output path

          # Option B: hostPath
          # hostPath:
          #   path: /path/to/output
          #   type: Directory

          # Option C: PVC
          # persistentVolumeClaim:
          #   claimName: scan-output-pvc

---
# Service — ClusterIP + optional LoadBalancer for phone access
apiVersion: v1
kind: Service
metadata:
  name: simple-scan-web
  namespace: default
spec:
  selector:
    app: simple-scan-web
  ports:
    - name: http
      port: 80
      targetPort: 8080
  # Change to LoadBalancer if you want a direct LAN IP (e.g. via MetalLB)
  # type: LoadBalancer
  type: ClusterIP

